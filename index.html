<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Liminal Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:               #080514;
    --glass-bg:         rgba(255,255,255,0.06);
    --glass-bg-mid:     rgba(255,255,255,0.10);
    --glass-border:     rgba(255,255,255,0.10);
    --glass-border-mid: rgba(255,255,255,0.18);
    --text:             rgba(255,255,255,0.93);
    --text-mid:         rgba(255,255,255,0.55);
    --text-dim:         rgba(255,255,255,0.30);
    --accent:           #6366f1;
    --accent-glow:      rgba(99,102,241,0.22);
    --accent-bright:    #818cf8;
    --red:              #ff6b6b;
    --blur:             blur(28px) saturate(180%);
  }

  html, body {
    height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .bg-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 15% 10%, #4f2d8e 0%, transparent 55%),
      radial-gradient(ellipse 40% 40% at 85% 85%, #1a3a6b 0%, transparent 55%),
      var(--bg);
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

  #app {
    position: relative; z-index: 1;
    height: 100vh; display: flex; flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    flex-shrink: 0; padding: 18px 24px 14px;
    border-bottom: 1px solid var(--glass-border);
    background: rgba(8,5,20,0.55);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .brand { display: flex; flex-direction: column; min-width: 200px; flex: 1; }
  .brand h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 20px; font-weight: 800; letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 10px;
  }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 9px;
    background: linear-gradient(135deg, rgba(99,102,241,0.4), rgba(129,140,248,0.18));
    border: 1px solid rgba(99,102,241,0.45);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px;
  }
  .brand-sub {
    font-size: 10px; color: var(--text-dim); margin-top: 4px;
    letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600;
  }

  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .search-wrap { position: relative; }
  .search-wrap input {
    background: rgba(0,0,0,0.28); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 10px 14px 10px 36px;
    color: var(--text); font-family: inherit; font-size: 13px;
    outline: none; width: 280px; transition: all 0.18s;
  }
  .search-wrap input:focus {
    border-color: rgba(99,102,241,0.5);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
  }
  .search-wrap input::placeholder { color: var(--text-dim); }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim); pointer-events: none;
  }
  .search-clear {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.08); border: none; color: var(--text-dim);
    width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    font-size: 12px; line-height: 1;
  }
  .search-clear:hover { background: rgba(255,255,255,0.18); color: var(--text); }
  .search-wrap.has-text .search-clear { display: flex; }

  .source-bar { display: flex; gap: 6px; align-items: center; }
  .chip {
    padding: 7px 13px; border-radius: 20px; border: 1px solid var(--glass-border);
    background: transparent; color: var(--text-dim);
    font: 600 11px/1 'Plus Jakarta Sans', sans-serif; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .chip:hover { border-color: var(--glass-border-mid); color: var(--text); background: rgba(255,255,255,0.05); }
  .chip.active {
    background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.35);
    color: var(--accent-bright);
  }
  .chip .count {
    margin-left: 6px; font-weight: 500; color: var(--text-dim);
  }
  .chip.active .count { color: var(--accent-bright); opacity: 0.8; }

  .stats {
    font-size: 11px; color: var(--text-dim); font-weight: 500;
    margin-left: auto;
  }

  /* ── BODY ── */
  main {
    flex: 1; overflow-y: auto; padding: 22px 24px 60px;
  }

  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 14px;
  }

  .game-card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 14px; overflow: hidden;
    display: flex; flex-direction: column;
    cursor: pointer; position: relative;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  }
  .game-card:hover {
    transform: translateY(-2px);
    border-color: rgba(99,102,241,0.4);
    box-shadow: 0 8px 28px rgba(0,0,0,0.32), 0 0 0 1px rgba(99,102,241,0.15);
  }

  .card-thumb {
    width: 100%; aspect-ratio: 1/1;
    background: linear-gradient(135deg, rgba(99,102,241,0.10), rgba(129,140,248,0.04));
    overflow: hidden; position: relative; flex-shrink: 0;
  }
  .card-thumb img {
    width: 100%; height: 100%; object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }
  .game-card:hover .card-thumb img { transform: scale(1.06); }

  .card-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.6) 100%);
    opacity: 0; transition: opacity 0.18s;
    display: flex; align-items: center; justify-content: center;
  }
  .game-card:hover .card-overlay { opacity: 1; }
  .play-circle {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(99,102,241,0.92); color: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 22px rgba(99,102,241,0.5);
    transform: scale(0.85); transition: transform 0.18s;
  }
  .game-card:hover .play-circle { transform: scale(1); }

  .card-source {
    position: absolute; top: 6px; right: 6px;
    font-size: 9px; font-weight: 700; letter-spacing: 0.05em;
    text-transform: uppercase;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    color: rgba(255,255,255,0.8);
    padding: 3px 7px; border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .card-body {
    padding: 9px 12px 11px;
  }
  .card-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 12.5px; font-weight: 700; color: var(--text);
    line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* States */
  .state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 20px; color: var(--text-dim); text-align: center; gap: 10px;
  }
  .state-icon { font-size: 36px; opacity: 0.6; }
  .state-title { font: 700 16px 'Montserrat', sans-serif; color: var(--text-mid); }
  .state-sub { font-size: 12px; line-height: 1.6; max-width: 320px; }

  /* Spinner */
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid rgba(255,255,255,0.12);
    border-top-color: var(--accent-bright);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── GAME VIEWER ── */
  #viewer {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column;
    background: #000;
    opacity: 0; pointer-events: none;
    transition: opacity 0.22s ease;
  }
  #viewer.open { opacity: 1; pointer-events: auto; }

  .viewer-bar {
    flex-shrink: 0;
    padding: 10px 16px;
    background: rgba(8,5,20,0.85);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border-bottom: 1px solid var(--glass-border);
    display: flex; align-items: center; gap: 12px;
  }
  .viewer-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 700; color: var(--text);
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .viewer-source {
    font-size: 9px; font-weight: 700; letter-spacing: 0.05em;
    text-transform: uppercase; color: var(--text-dim);
    padding: 3px 8px; border-radius: 5px;
    background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border);
  }
  .viewer-btn {
    background: rgba(255,255,255,0.07); border: 1px solid var(--glass-border);
    color: var(--text-mid); padding: 7px 12px; border-radius: 8px;
    font: 600 11px 'Plus Jakarta Sans'; cursor: pointer;
    transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .viewer-btn:hover { background: rgba(255,255,255,0.13); color: var(--text); border-color: var(--glass-border-mid); }
  .viewer-btn.danger { color: var(--red); }
  .viewer-btn.danger:hover { background: rgba(255,107,107,0.15); border-color: rgba(255,107,107,0.4); }

  .viewer-frame-wrap { flex: 1; position: relative; background: #000; }
  #viewer-iframe { width: 100%; height: 100%; border: none; display: block; background: #000; }

  .viewer-loading {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; background: rgba(0,0,0,0.6); color: var(--text-mid);
    font-size: 12px;
  }

  @media (max-width: 640px) {
    header { padding: 14px 14px 12px; gap: 12px; }
    .brand h1 { font-size: 17px; }
    .search-wrap input { width: 100%; }
    .search-wrap { flex: 1 1 100%; }
    main { padding: 16px 14px 40px; }
    .game-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
    .card-title { font-size: 11.5px; }
    .stats { font-size: 10px; }
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>

  <div id="app">
    <header>
      <div class="brand">
        <h1>
          <span class="brand-mark">L</span>
          Liminal Games
        </h1>
        <div class="brand-sub" id="brand-sub">loading library…</div>
      </div>

      <div class="controls">
        <div class="search-wrap" id="search-wrap">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input id="search" type="text" placeholder="Search games…" autocomplete="off" spellcheck="false" />
          <button class="search-clear" id="search-clear" title="Clear" aria-label="Clear">×</button>
        </div>

        <div class="source-bar" id="source-bar">
          <button class="chip active" data-source="all">All <span class="count" data-count="all"></span></button>
          <button class="chip" data-source="gnmath">GN-Math <span class="count" data-count="gnmath"></span></button>
          <button class="chip" data-source="ccported">ccPorted <span class="count" data-count="ccported"></span></button>
          <button class="chip" data-source="seraph">Seraph <span class="count" data-count="seraph"></span></button>
        </div>

        <div class="stats" id="stats"></div>
      </div>
    </header>

    <main id="main">
      <div class="state" id="loading-state">
        <div class="spinner"></div>
        <div class="state-title">Loading library</div>
        <div class="state-sub">Fetching games from GN-Math, ccPorted and Seraph…</div>
      </div>
      <div class="game-grid" id="grid" hidden></div>
      <div class="state" id="empty-state" hidden>
        <div class="state-icon">🔍</div>
        <div class="state-title">No matches</div>
        <div class="state-sub">Try a different search or another source.</div>
      </div>
      <div class="state" id="error-state" hidden>
        <div class="state-icon">⚠️</div>
        <div class="state-title">Couldn't load games</div>
        <div class="state-sub" id="error-msg"></div>
      </div>
    </main>
  </div>

  <!-- ─── GAME VIEWER ─── -->
  <div id="viewer">
    <div class="viewer-bar">
      <span class="viewer-source" id="viewer-source"></span>
      <span class="viewer-title" id="viewer-title"></span>
      <button class="viewer-btn" id="viewer-newtab" title="Open in new tab">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14 21 3"/></svg>
        New tab
      </button>
      <button class="viewer-btn" id="viewer-fullscreen" title="Fullscreen">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
        Fullscreen
      </button>
      <button class="viewer-btn danger" id="viewer-close">Close</button>
    </div>
    <div class="viewer-frame-wrap">
      <iframe id="viewer-iframe" allow="autoplay; fullscreen; gamepad; pointer-lock" allowfullscreen></iframe>
      <div class="viewer-loading" id="viewer-loading">
        <div class="spinner"></div>
        <div>Loading game…</div>
      </div>
    </div>
  </div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const grid = $('grid');
  const loadingState = $('loading-state');
  const emptyState = $('empty-state');
  const errorState = $('error-state');
  const errorMsg = $('error-msg');
  const main = $('main');
  const searchInput = $('search');
  const searchWrap = $('search-wrap');
  const searchClear = $('search-clear');
  const sourceBar = $('source-bar');
  const stats = $('stats');
  const brandSub = $('brand-sub');

  const viewer = $('viewer');
  const viewerIframe = $('viewer-iframe');
  const viewerLoading = $('viewer-loading');
  const viewerTitle = $('viewer-title');
  const viewerSource = $('viewer-source');

  let allGames = [];
  let filtered = [];
  let activeSource = 'all';
  let query = '';
  let renderCursor = 0;
  const PAGE_SIZE = 80;
  let activeGame = null;

  const SOURCE_LABEL = { gnmath: 'GN-Math', ccported: 'ccPorted', seraph: 'Seraph' };

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function applyFilter() {
    const q = query.trim().toLowerCase();
    filtered = allGames.filter(g => {
      if (activeSource !== 'all' && g.source !== activeSource) return false;
      if (!q) return true;
      if (g.name.toLowerCase().includes(q)) return true;
      if (Array.isArray(g.tags) && g.tags.some(t => t.toLowerCase().includes(q))) return true;
      return false;
    });
    renderCursor = 0;
    grid.innerHTML = '';
    if (filtered.length === 0) {
      grid.hidden = true;
      emptyState.hidden = false;
    } else {
      grid.hidden = false;
      emptyState.hidden = true;
      appendBatch();
    }
    stats.textContent = `${filtered.length.toLocaleString()} game${filtered.length === 1 ? '' : 's'}`;
  }

  function appendBatch() {
    const end = Math.min(renderCursor + PAGE_SIZE, filtered.length);
    const frag = document.createDocumentFragment();
    for (let i = renderCursor; i < end; i++) {
      const g = filtered[i];
      const card = document.createElement('div');
      card.className = 'game-card';
      card.dataset.idx = i;
      card.innerHTML = `
        <div class="card-thumb">
          ${g.thumb ? `<img src="${escapeHtml(g.thumb)}" alt="" loading="lazy" decoding="async" onerror="this.remove()">` : ''}
          <div class="card-overlay"><div class="play-circle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </div></div>
          <span class="card-source">${escapeHtml(SOURCE_LABEL[g.source] || g.source)}</span>
        </div>
        <div class="card-body"><div class="card-title">${escapeHtml(g.name)}</div></div>
      `;
      card.addEventListener('click', () => launchGame(g));
      frag.appendChild(card);
    }
    grid.appendChild(frag);
    renderCursor = end;
  }

  // Infinite scroll
  main.addEventListener('scroll', () => {
    if (renderCursor >= filtered.length) return;
    if (main.scrollTop + main.clientHeight >= main.scrollHeight - 600) {
      appendBatch();
    }
  });

  // Search
  let searchDebounce;
  searchInput.addEventListener('input', () => {
    query = searchInput.value;
    searchWrap.classList.toggle('has-text', query.length > 0);
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(applyFilter, 80);
  });
  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    query = '';
    searchWrap.classList.remove('has-text');
    applyFilter();
    searchInput.focus();
  });

  // Source filter
  sourceBar.addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    sourceBar.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === chip));
    activeSource = chip.dataset.source;
    applyFilter();
  });

  // Keyboard: / focuses search, esc closes viewer
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== searchInput) {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    } else if (e.key === 'Escape') {
      if (viewer.classList.contains('open')) closeGame();
    }
  });

  // ─── Game viewer ───
  function launchGame(g) {
    activeGame = g;
    viewerTitle.textContent = g.name;
    viewerSource.textContent = SOURCE_LABEL[g.source] || g.source;
    viewerLoading.style.display = 'flex';
    viewerIframe.src = 'about:blank';
    viewer.classList.add('open');
    document.body.style.overflow = 'hidden';

    // URL state for back-button support
    try {
      const url = new URL(location.href);
      url.searchParams.set('game', g.id);
      history.pushState({ gameId: g.id }, '', url);
    } catch {}

    // Set src after a tick so the iframe properly resets
    requestAnimationFrame(() => { viewerIframe.src = g.url; });
  }

  function closeGame() {
    viewer.classList.remove('open');
    activeGame = null;
    viewerIframe.src = 'about:blank';
    document.body.style.overflow = '';
    try {
      const url = new URL(location.href);
      if (url.searchParams.has('game')) {
        url.searchParams.delete('game');
        history.replaceState(null, '', url);
      }
    } catch {}
  }

  viewerIframe.addEventListener('load', () => {
    if (viewerIframe.src && viewerIframe.src !== 'about:blank') {
      viewerLoading.style.display = 'none';
    }
  });

  $('viewer-close').addEventListener('click', closeGame);
  $('viewer-newtab').addEventListener('click', () => {
    if (activeGame) window.open(activeGame.url, '_blank', 'noopener');
  });
  $('viewer-fullscreen').addEventListener('click', () => {
    const el = $('viewer-iframe').parentElement;
    if (document.fullscreenElement) document.exitFullscreen();
    else el.requestFullscreen?.();
  });

  window.addEventListener('popstate', () => {
    const id = new URL(location.href).searchParams.get('game');
    if (!id) {
      if (viewer.classList.contains('open')) closeGame();
    } else {
      const g = allGames.find(x => x.id === id);
      if (g && (!activeGame || activeGame.id !== id)) launchGame(g);
    }
  });

  // ─── Boot ───
  // Single-file launcher: pulls the manifest from jsdelivr so re-running
  // build-games.js + pushing to main is enough to update the live site.
  // jsdelivr caches @main for ~12h; ?dev loads the local copy for testing.
  const REPO = 'WhopperCat/liminalgames';
  const BRANCH = 'main';
  const REMOTE_MANIFEST = `https://cdn.jsdelivr.net/gh/${REPO}@${BRANCH}/games.json`;
  const LOCAL_MANIFEST = 'games.json';
  const useLocal = new URLSearchParams(location.search).has('dev');

  async function boot() {
    // file:// can't fetch — catch it before the spinner hangs forever
    if (location.protocol === 'file:') {
      loadingState.hidden = true;
      errorState.hidden = false;
      errorMsg.innerHTML = `Can't load games when opened as a local file.<br>
        Serve it from a web server, or open the live launcher at<br>
        <a href="${REMOTE_MANIFEST.replace('/games.json','/index.html')}" target="_blank" style="color:var(--accent-bright)">
          cdn.jsdelivr.net/gh/${REPO}@${BRANCH}/index.html
        </a> once you've pushed to GitHub.`;
      return;
    }
    try {
      const url = useLocal ? LOCAL_MANIFEST : REMOTE_MANIFEST;
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);
      const res = await fetch(url, { cache: 'default', signal: controller.signal });
      clearTimeout(timeout);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      allGames = (data.games || []).filter(g => g && g.name && g.url);

      // Update counts
      const counts = { all: allGames.length, gnmath: 0, ccported: 0, seraph: 0 };
      for (const g of allGames) counts[g.source] = (counts[g.source] || 0) + 1;
      for (const [k, v] of Object.entries(counts)) {
        const el = sourceBar.querySelector(`[data-count="${k}"]`);
        if (el) el.textContent = v.toLocaleString();
      }

      brandSub.textContent = `${allGames.length.toLocaleString()} games · gn-math · ccported · seraph`;
      loadingState.hidden = true;
      grid.hidden = false;
      applyFilter();

      // Restore game from URL if present
      const id = new URL(location.href).searchParams.get('game');
      if (id) {
        const g = allGames.find(x => x.id === id);
        if (g) launchGame(g);
      }
    } catch (err) {
      loadingState.hidden = true;
      errorState.hidden = false;
      const reason = err.name === 'AbortError' ? 'Request timed out' : err.message;
      errorMsg.textContent = useLocal
        ? `${reason} — run "node build-games.js" to generate games.json.`
        : `${reason} — games.json may not be pushed to ${REPO}@${BRANCH} yet.`;
    }
  }

  boot();
})();
</script>
</body>
</html>
